services:

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      - redis
    environment:
      ORIGIN: ${ORIGIN:-http://localhost}
      RP_ID: ${RP_ID:-attendance.softeng.com}
      RP_NAME: ${RP_NAME:-Passkey Attendance System}
      REGISTRATION_PROTOCOL: ${REGISTRATION_PROTOCOL:-pas}
    volumes:
      - sqlite_data:/app/db
    ports:
      - "8000:8000"

  web:
    build:
      context: ./frontend/web
      args:
        NEXT_PUBLIC_API_ORIGIN: ${NEXT_PUBLIC_API_ORIGIN:-http://localhost:8000}
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      PORT: "3000"
    ports:
      - "80:3000"

volumes:
  redis_data:
  sqlite_data:

services:

  postgres:
    image: postgres:16
    container_name: pas-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: attendance
      POSTGRES_USER: pas
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pas -d attendance"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    networks:
      - pas-network

  redis:
    image: redis:8
    container_name: pas-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    networks:
      - pas-network

  backend:
    container_name: pas-backend
    build: ./backend
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql+psycopg2://pas:${POSTGRES_PASSWORD:-changeme}@postgres:5432/attendance
      WEB_ORIGIN: https://attendance.whatta.top
      APP_ORIGIN: android:apk-key-hash:3mg2iB-JtknVTWAQS81rSIMVIWhj2OJ_PjUn-_33134
      RP_ID: attendance.whatta.top
      RP_NAME: Passkey Attendance System
      REGISTRATION_PROTOCOL: shifterest-pas
      SERVER_TIMEZONE: Asia/Manila
      TRUSTED_PROXY: ${TRUSTED_PROXY:-}
    ports:
      - "8000:8000"
    networks:
      - pas-network

  web:
    container_name: pas-frontend
    build:
      context: ./frontend/web
      args:
        NEXT_PUBLIC_API_ORIGIN: https://api-attendance.whatta.top
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      PORT: "3000"
      API_ORIGIN_SERVER: http://backend:8000
    ports:
      - "3000:3000"
    networks:
      - pas-network

volumes:
  redis_data:
  postgres_data:

networks:
  pas-network:
